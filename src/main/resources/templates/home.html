<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Início</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body class="pagina">
<main class="card card-grande">
    <h1>Cardápio</h1>

    <div class="topo">
        <p>Olá, <strong th:text="${usuarioLogin}">usuário</strong>!</p>

        <form method="post" th:action="@{/logout}">
            <button class="botao-secundario" type="submit">Sair</button>
        </form>
    </div>

    <form id="form-cardapio" method="post" th:action="@{/cardapio}" novalidate>
        <input name="id" type="hidden" th:value="${item.id}">

        <div class="campos">
            <div>
                <label for="nome">Nome:</label>
                <input id="nome" name="nome" type="text" maxlength="100"
                       th:value="${item.nome}">
            </div>

            <div>
                <label for="preco">Preço:</label>
                <input id="preco" name="preco" type="number" step="0.01"
                       th:value="${item.preco}">
            </div>
        </div>

        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao" rows="3" maxlength="255"
                  th:text="${item.descricao}"></textarea>

        <button type="submit">Salvar</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Preço</th>
            <th>Alterar</th>
            <th>Excluir</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(itens)}">
            <td colspan="5">Nenhum item cadastrado.</td>
        </tr>
        <tr th:each="item : ${itens}">
            <td th:text="${item.nome}">Exemplo</td>
            <td th:text="${item.descricao}">Descrição</td>
            <td th:text="${item.preco}">0,00</td>
            <td>
                <a class="icone" th:href="@{/cardapio/{id}/editar(id=${item.id})}"
                   title="Alterar" aria-label="Alterar">✏️</a>
            </td>
            <td>
                <form method="post" th:action="@{/cardapio/{id}/excluir(id=${item.id})}">
                    <button class="icone" type="submit" title="Excluir" aria-label="Excluir">🗑️</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<div id="alerta" class="modal escondido" role="alert">
    <div class="modal-conteudo">
        <h2>Verifique os dados</h2>
        <p id="mensagem-alerta"></p>
        <button id="fechar-alerta" type="button">Entendi</button>
    </div>
</div>

<script th:src="@{/js/validacao-cardapio.js}"></script>
</body>
</html>
