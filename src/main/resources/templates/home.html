<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Início</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body class="pagina">
<main class="card card-grande">
    <h1>Cardápio</h1>

    <p>Olá, <strong th:text="${session.usuarioLogin}">usuário</strong>!</p>

    <form method="post" action="/cardapio">
        <input name="id" type="hidden" th:value="${itemEdicao?.id}">

        <div class="campos">
            <div>
                <label for="nome">Nome:</label>
                <input id="nome" name="nome" type="text" th:value="${itemEdicao?.nome}" required>
            </div>

            <div>
                <label for="preco">Preço:</label>
                <input id="preco" name="preco" type="number" min="0" step="0.01"
                       th:value="${itemEdicao?.preco}" required>
            </div>
        </div>

        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao" rows="3"
                  th:text="${itemEdicao?.descricao}"></textarea>

        <button type="submit">Salvar</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Preço</th>
            <th>Alterar</th>
            <th>Excluir</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(itens)}">
            <td colspan="5">Nenhum item cadastrado.</td>
        </tr>
        <tr th:each="item : ${itens}">
            <td th:text="${item.nome}">Exemplo</td>
            <td th:text="${item.descricao}">Descrição</td>
            <td th:text="${item.preco}">0,00</td>
            <td>
                <a class="icone" th:href="@{/cardapio/{id}/editar(id=${item.id})}"
                   title="Alterar" aria-label="Alterar">✏️</a>
            </td>
            <td>
                <form method="post" th:action="@{/cardapio/{id}/excluir(id=${item.id})}">
                    <button class="icone" type="submit" title="Excluir" aria-label="Excluir">🗑️</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>
